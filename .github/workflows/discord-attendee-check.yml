name: Discord Attendee Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Call attendee-check endpoint
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.APP_URL }}/api/discord/attendee-check" \
            | tee /tmp/attendee_response.json
          cat /tmp/attendee_response.json
