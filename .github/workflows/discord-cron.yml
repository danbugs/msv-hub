name: Discord Cron

on:
  schedule:
    # Twice daily for motivational messages (48h throttle), plus announcement windows.
    # 15:30 UTC = 8:30 AM PDT, 16:30 UTC = 8:30 AM PST
    - cron: '30 3 * * *'
    - cron: '30 15 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.APP_URL }}/api/discord/cron" \
            | tee /tmp/cron_response.json
          cat /tmp/cron_response.json
