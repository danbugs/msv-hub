name: Discord Cron

on:
  schedule:
    - cron: '30 16 * * 3'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.APP_URL }}/api/discord/cron" \
            | tee /tmp/cron_response.json
          cat /tmp/cron_response.json
